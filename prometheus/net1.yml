global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'server-01'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          network: 'network1'
    relabel_configs:
      - source_labels: [__address__]
        regex: '.*'
        target_label: instance
        replacement: '192.168.1.10:9100'

  - job_name: 'server-02'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          network: 'network1'
    relabel_configs:
      - source_labels: [__address__]
        regex: '.*'
        target_label: instance
        replacement: '192.168.1.11:9100'

  - job_name: 'server-03'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          network: 'network1'
    relabel_configs:
      - source_labels: [__address__]
        regex: '.*'
        target_label: instance
        replacement: '192.168.1.12:9100'
