global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'net3-server-01'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          network: 'network3'
    relabel_configs:
      - source_labels: [__address__]
        regex: '.*'
        target_label: instance
        replacement: '10.10.0.2:9100'

  - job_name: 'net3-server-02'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          network: 'network3'
    relabel_configs:
      - source_labels: [__address__]
        regex: '.*'
        target_label: instance
        replacement: '10.10.0.3:9100'
