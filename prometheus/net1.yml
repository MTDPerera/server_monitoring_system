global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # In dev: Prometheus scrapes itself as a stand-in for node_exporter targets.
  # In production: replace these targets with your actual server IPs on port 9100.
  - job_name: 'servers'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          network: 'network1'
          env: 'dev-mock'
